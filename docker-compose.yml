services:
  rabbitmq:
    image: rabbitmq:3-management-alpine
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongo:
    image: mongo:8
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test:
        ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  user-service:
    build: ./backend/user
    ports:
      - "5000:5000"
    env_file: ./backend/user/.env
    environment:
      - Rabbitmq_Host=rabbitmq
      - Rabbitmq_Username=guest
      - Rabbitmq_Password=guest
      - MONGO_DB_NAME=chat_user_service
      - MONGO_URI=mongodb://mongo:27017/chat_app
    depends_on:
      rabbitmq:
        condition: service_healthy
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5000/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  mail-service:
    build: ./backend/mail
    env_file: ./backend/mail/.env
    environment:
      - Rabbitmq_Host=rabbitmq
      - Rabbitmq_Username=guest
      - Rabbitmq_Password=guest
    depends_on:
      rabbitmq:
        condition: service_healthy

  chat-service:
    build: ./backend/chat
    ports:
      - "5002:5002"
    env_file: ./backend/chat/.env
    environment:
      - Rabbitmq_Host=rabbitmq
      - Rabbitmq_Username=guest
      - Rabbitmq_Password=guest
      - MONGO_DB_NAME=chat_chat_service
      - MONGO_URI=mongodb://mongo:27017/chat_app
      - USER_SERVICE=http://user-service:5000
    depends_on:
      rabbitmq:
        condition: service_healthy
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5002/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  gateway:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - user-service
      - chat-service

  frontend:
    build:
      context: ./frontend
      args:
        - NEXT_PUBLIC_GATEWAY_URL=${NEXT_PUBLIC_GATEWAY_URL:-http://localhost}
    ports:
      - "3000:3000"
    depends_on:
      - gateway

volumes:
  mongo_data:
  redis_data:
