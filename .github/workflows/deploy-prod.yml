name: Deploy Production

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Validate deploy workflow without SSHing to a server"
        required: true
        default: true
        type: boolean

permissions:
  contents: read

concurrency:
  group: production
  cancel-in-progress: false

jobs:
  validate:
    name: Validate deploy configuration
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate production compose
        env:
          NEXT_PUBLIC_GATEWAY_URL: https://example.com
          RABBITMQ_DEFAULT_USER: ci_rabbit
          RABBITMQ_DEFAULT_PASS: ci_rabbit_password
          MONGO_ROOT_USERNAME: ci_mongo
          MONGO_ROOT_PASSWORD: ci_mongo_password
          REDIS_PASSWORD: ci_redis_password
          NGINX_TLS_CERT_PATH: ./secrets/nginx/tls.crt
          NGINX_TLS_KEY_PATH: ./secrets/nginx/tls.key
          GATEWAY_HTTP_PORT: 80
          GATEWAY_HTTPS_PORT: 443
        run: docker compose -f docker-compose.prod.yml config --quiet

  deploy:
    name: Deploy over SSH
    needs: validate
    if: ${{ github.event_name == 'workflow_dispatch' && !inputs.dry_run }}
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Deploy
        uses: appleboy/ssh-action@v1.2.0
        env:
          APP_DIR: ${{ secrets.PROD_APP_DIR }}
          NEXT_PUBLIC_GATEWAY_URL: ${{ secrets.NEXT_PUBLIC_GATEWAY_URL }}
          RABBITMQ_DEFAULT_USER: ${{ secrets.RABBITMQ_DEFAULT_USER }}
          RABBITMQ_DEFAULT_PASS: ${{ secrets.RABBITMQ_DEFAULT_PASS }}
          MONGO_ROOT_USERNAME: ${{ secrets.MONGO_ROOT_USERNAME }}
          MONGO_ROOT_PASSWORD: ${{ secrets.MONGO_ROOT_PASSWORD }}
          REDIS_PASSWORD: ${{ secrets.REDIS_PASSWORD }}
          NGINX_TLS_CERT_PATH: ${{ secrets.NGINX_TLS_CERT_PATH }}
          NGINX_TLS_KEY_PATH: ${{ secrets.NGINX_TLS_KEY_PATH }}
          GATEWAY_HTTP_PORT: ${{ secrets.GATEWAY_HTTP_PORT }}
          GATEWAY_HTTPS_PORT: ${{ secrets.GATEWAY_HTTPS_PORT }}
        with:
          host: ${{ secrets.PROD_SSH_HOST }}
          username: ${{ secrets.PROD_SSH_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          port: ${{ secrets.PROD_SSH_PORT || 22 }}
          envs: APP_DIR,NEXT_PUBLIC_GATEWAY_URL,RABBITMQ_DEFAULT_USER,RABBITMQ_DEFAULT_PASS,MONGO_ROOT_USERNAME,MONGO_ROOT_PASSWORD,REDIS_PASSWORD,NGINX_TLS_CERT_PATH,NGINX_TLS_KEY_PATH,GATEWAY_HTTP_PORT,GATEWAY_HTTPS_PORT
          script: |
            set -eu
            cd "$APP_DIR"
            git fetch origin main
            git checkout main
            git pull --ff-only origin main
            docker compose -f docker-compose.prod.yml config --quiet
            docker compose -f docker-compose.prod.yml up -d --build
            docker compose -f docker-compose.prod.yml ps
